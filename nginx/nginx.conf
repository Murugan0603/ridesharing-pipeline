events {
    worker_connections 1024;
}

http {
    upstream auth-svc     { server auth-svc:3001; }
    upstream matching-svc { server matching-svc:3002; }
    upstream location-svc { server location-svc:3003; }
    upstream trip-svc     { server trip-svc:3004; }
    upstream payment-svc  { server payment-svc:3007; }
    upstream notify-svc   { server notify-svc:3006; }
    upstream ws-svc       { server websocket-svc:3005; }

    server {
        listen 80;

        location /auth/ {
            proxy_pass http://auth-svc/;
        }

        location /matching/ {
            proxy_pass http://matching-svc/;
        }

        location /location/ {
            proxy_pass http://location-svc/;
        }

        location /trip/ {
            proxy_pass http://trip-svc/;
        }

        # ✅ FIXED PAYMENT
        location /payment/ {
            proxy_pass http://payment-svc/;
        }

        # ✅ FIXED NOTIFY
        location /notify/ {
            proxy_pass http://notify-svc/;
        }

        location /ws/ {
            proxy_pass http://ws-svc/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}